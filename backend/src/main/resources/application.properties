spring.application.name=bot-funnel-backend

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}
# Disables automatic index creation on startup (index management handled explicitly in later epics)
spring.data.mongodb.auto-index-creation=false

# Redis
spring.data.redis.url=${REDIS_URL}

# Session
spring.session.store-type=mongodb
spring.session.mongodb.collection-name=sessions
server.reactive.session.cookie.http-only=true
app.session.ttl-default-hours=${SESSION_TTL_DEFAULT_HOURS:24}
app.session.ttl-remember-me-days=${SESSION_TTL_REMEMBER_ME_DAYS:30}

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:noreply@botfunnel.local}
app.support-email=${SUPPORT_EMAIL:support@botfunnel.local}
app.url=${APP_URL:http://localhost:3000}

# JobRunr
org.jobrunr.background-job-server.enabled=true
org.jobrunr.dashboard.enabled=false

# Super Admin
app.super-admin.email=${SUPER_ADMIN_EMAIL:}
app.super-admin.password=${SUPER_ADMIN_PASSWORD}

# Surface failed auth and 401 responses in default INFO logs
logging.level.org.springframework.security=INFO
