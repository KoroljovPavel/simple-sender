spring.application.name=bot-funnel-backend

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/botfunnel}
# Auto-create indexes from @Indexed annotations on entities at startup (e.g. unique email on User).
spring.data.mongodb.auto-index-creation=true

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Session
spring.session.store-type=mongodb
spring.session.mongodb.collection-name=sessions
server.reactive.session.cookie.http-only=true
server.reactive.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.reactive.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
app.session.ttl-default-hours=${SESSION_TTL_DEFAULT_HOURS:24}
app.session.ttl-remember-me-days=${SESSION_TTL_REMEMBER_ME_DAYS:30}

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:noreply@botfunnel.local}
app.support-email=${SUPPORT_EMAIL:support@botfunnel.local}
app.url=${APP_URL:http://localhost:3000}

# Projects
app.projects.max-per-user=${PROJECTS_MAX_PER_USER:5}

# JobRunr
org.jobrunr.background-job-server.enabled=true
org.jobrunr.dashboard.enabled=false

# Super Admin
app.super-admin.email=${SUPER_ADMIN_EMAIL:admin@admin.com}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:12345678}

# Surface failed auth and 401 responses in default INFO logs
logging.level.org.springframework.security=INFO
