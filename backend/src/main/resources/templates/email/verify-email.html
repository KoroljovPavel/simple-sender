<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Підтвердіть email</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
  <h1 style="color: #2c3e50;">Підтвердіть свій email</h1>
  <p>Вітаємо, {NAME}!</p>
  <p>Для завершення реєстрації підтвердіть свою електронну адресу, перейшовши за посиланням нижче:</p>
  <p style="text-align: center; margin: 32px 0;">
    <a href="{APP_URL}/auth/verify-email?token={TOKEN}"
       style="display: inline-block; padding: 12px 24px; background-color: #3498db; color: #ffffff; text-decoration: none; border-radius: 4px; font-size: 16px;">
      Підтвердити email
    </a>
  </p>
  <p>Посилання дійсне протягом <strong>24 годин</strong>.</p>
  <p style="color: #666; font-size: 14px;">Якщо ви не реєструвалися на нашому сайті, просто проігноруйте цей лист.</p>
</body>
</html>
