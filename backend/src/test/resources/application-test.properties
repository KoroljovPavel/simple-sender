MONGODB_URI=mongodb://localhost:27017/test
REDIS_URL=redis://localhost:6379
SUPER_ADMIN_EMAIL=admin@test.com
SUPER_ADMIN_PASSWORD=test-admin-password
# JobRunr: disable the background job server in tests so we don't spawn worker threads while
# verifying scheduled-job registration. Recurring-job @Recurring registration still runs at
# context startup against the InMemoryStorageProvider supplied by jobrunr-spring-boot-3-starter
# auto-configuration when no other StorageProvider bean is present.
org.jobrunr.background-job-server.enabled=false
