phase2_user_experience:
  user_flows:
    score: 90
    value: |
      Developer flow (documented in docs/local-setup.md):
      Prerequisites: Java 21, Node.js LTS, Docker, pnpm
      1. Clone repo
      2. Copy .env.example → .env (MONGODB_URI + REDIS_URL defaults work as-is)
      3. docker compose up → MongoDB :27017 + Redis :6379
      4. Run backend in IntelliJ or ./gradlew bootRun → :8080
      5. pnpm install && pnpm dev → frontend :3000
      6. Verify: GET http://localhost:8080/health → {"status":"ok"}
      No end-user flows in this epic.
    gaps: []
    status: done
  edge_cases:
    score: 80
    value: |
      - Docker not installed → docs/local-setup.md links to docs.docker.com
      - Port 27017 or 6379 already in use → docs show how to change port mapping in .env (MONGODB_PORT, REDIS_PORT vars or docker-compose.override.yml)
      - Windows → warning in docs that Linux/Mac is recommended; WSL2 suggested
    gaps: []
    status: done
  error_scenarios:
    score: 90
    value: |
      Epic 01 is skeleton only — default Spring Boot behavior is sufficient.
      If MongoDB/Redis not running: Spring Boot logs connection error and exits. No custom handling needed.
      Documented in local-setup.md: run docker compose up before starting the backend.
    gaps: []
    status: done

