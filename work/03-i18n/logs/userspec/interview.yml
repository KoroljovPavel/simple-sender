      - new middleware/00-i18n-fallback.global.ts: invalid-prefix fallback.
      - new composables/useApiError.ts: centralized API-error → translated message.
      - new components/LangSwitcher.vue.
      - new i18n/locales/uk.json + en.json.
      Backend: zero changes.
    gaps: ""
    required: true

  dependencies:
    score: 90
    status: "complete"
    value: |
      New: @nuxtjs/i18n@^9 (peer: vue-i18n@^11, transitively).
      Existing reused: vee-validate + zod (Zod messages will live in locale files), Pinia
