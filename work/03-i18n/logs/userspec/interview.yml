# ============================================================================
# Phase 1: High-Level Feature Understanding
# ============================================================================
# Interview Cycle 1 scope
phase1_feature_overview:

  feature_name:
    score: 100
    status: "complete"
    value: "03-i18n"
    gaps: ""
    required: true

  feature_description:
    score: 95
    status: "complete"
    value: |
      Add @nuxtjs/i18n@^9 to the Nuxt 4 frontend with two locales: uk (default) and en.
      URL strategy `prefix_except_default` (uk paths unchanged, en paths get `/en/...` prefix).
      Locale persisted in cookie `i18n_lang` (1y TTL). Detection precedence: URL > cookie >
      Accept-Language > default uk. Translate ALL existing user-visible strings: 5 auth pages,
      dashboard, profile, default + auth layouts, API error mappings (401/403/429/generic),
      Zod validation messages. Add a UK | EN toggle switcher (text-only): in default layout
      topbar (right of avatar/Logout), and absolute-positioned top-right of auth layout
      background. Backend (email templates, error messages) stays Ukrainian — out of scope.
    gaps: ""
    required: true

  work_type:
    score: 100
    status: "complete"
    value: "feature"
    gaps: ""
    required: true

  user_problem:
    score: 90
    status: "complete"
    value: |
      ux-guidelines mandates `t('key')` from MVP, but the current frontend has all strings
      hardcoded (UA on auth pages, EN on default layout). With ~10 frontend files now, the
      translation cost is small (~150 strings, 1 person-day with agent writing both locales).
      In 5 epics this grows to 50+ files and becomes painful. This feature pays the cost
      now and unblocks EN-first demos to potential early users / investors.
    gaps: ""
    required: true

  target_users:
    score: 80
    status: "complete"
    value: |
      Primary near-term: founder for screenshots and EN-language demos to potential early
      users / investors. Long-term: end-users on EN-speaking markets. Internally also: any
      future agent or contributor who must add a new page — i18n infrastructure is in place
      so they cannot accidentally hardcode strings.
    gaps: ""
    required: false

  success_criteria:
    score: 95
    status: "complete"
    value: |
      Concrete checklist:
      (1) Every visible string in 5 auth pages, dashboard, profile, default + auth layouts,
          API error mappings, Zod messages → moved to locale files.
      (2) Switcher (UK | EN, text-only toggle, active state highlighted) in default topbar
          and auth bg (absolute top-right).
      (3) Cookie `i18n_lang` (1y TTL); SSR returns correct locale on first request — no flicker.
      (4) URL: uk has no prefix; en has `/en/...` prefix.
      (5) `<html lang="...">` updates on switch (handled by lib).
      (6) 1× Vitest spec on `<LangSwitcher>` component (render + click + locale change);
          1× Playwright E2E (login → switch → form re-rendered EN).
      (7) Optional CI grep gate: 0 raw multi-letter visible strings in pages/ + layouts/.
      (8) Untouched: backend email templates (UA), backend error responses, existing UA test asserts.
    gaps: ""
    required: true

  constraints:
    score: 90
    status: "complete"
    value: |
      - Default locale uk; second locale en. No ru in this feature.
      - URL strategy `prefix_except_default`.
      - Cookie persistence (not localStorage) — required for SSR.
      - Eager-load locales (small ~10KB each, 2 langs only — no lazy split).
      - Missing-key fallback: en → uk; if uk missing, raw key + console.warn (dev).
      - No pluralization API (no item counts in current UI).
      - No date/number formatters (no current UI surfaces them).
      - Brand name 'Bot Funnel' is a proper noun — same in both locales.
      - <title> via useHead is out of scope — separate refactor.
      - Backend (email templates, server error messages) stays UA.
      - Existing UA-literal test asserts kept as-is (default locale stays uk).
    gaps: ""
    required: true

  testing_strategy:
    score: 95
    status: "complete"
    value: |
      Feature size M → focused testing, not exhaustive:
      - Vitest: 1 spec on `<LangSwitcher>` component (render UK/EN buttons; click toggles
        active state; verify `setLocale` called and cookie updated). NO per-key unit tests
        (those would be tautological — string == string).
      - Playwright E2E: 1 spec — open `/auth/login` (uk default), click EN toggle, assert
        URL becomes `/en/auth/login`, assert visible button text changes from 'Увійти' to
        'Sign in', submit invalid email and assert validation message is in EN.
      - **Playwright bootstrap is a separate task in Wave 1** (install @playwright/test,
        create playwright.config.ts, add `test:e2e` npm script, create `e2e/` dir,
        gitignore `playwright-report/` + `test-results/`). The i18n.spec.ts E2E lives in
        a later wave once features are implemented.
      - Optional CI grep gate: pre-commit / CI script that fails if `pages/` or `layouts/`
        contain 3+ letter visible strings outside `t('...')` (catches future regressions).
      - Existing 5 frontend spec files keep UA asserts (default locale stays uk).
      - tests/middleware/auth.global.spec.ts path asserts kept unchanged — `localePath`
        for default uk returns the same path string, so existing asserts pass.
      - No backend tests change.
    gaps: ""
    required: true

# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
# Interview Cycle 2 scope (together with Phase 3)
phase2_user_experience:

  user_stories:
    score: 90
    status: "complete"
    value: |
      A. First visit no cookie, browser EN: user opens `/dashboard` (not logged in) →
         `Accept-Language: en` detected → redirect `/en/auth/login`, cookie `i18n_lang=en` set.
      B. First visit no cookie, browser UA: user opens any path → renders uk (no prefix),
         cookie `i18n_lang=uk` set.
      C. Switcher in topbar: logged-in user on `/dashboard` (uk) clicks "EN" toggle →
         URL becomes `/en/dashboard`, cookie updates, content re-renders EN.
      D. Bookmark: `/en/profile` opened on a fresh device (no cookie) → renders EN, cookie
         set to en. Sharing EN URLs works.
      E. Invalid prefix: `/fr/dashboard` → server-side global middleware (runs before auth)
         strips the unknown 2-letter prefix → 302 redirect to `/dashboard` (default uk).
    gaps: ""
    required: true

  acceptance_criteria:
    score: 95
    status: "complete"
    value: |
      See success_criteria — same testable checklist will become AC in user-spec.md.
    gaps: ""
    required: true

  edge_cases:
    score: 90
    status: "complete"
    value: |
      - Cookie with invalid value (`i18n_lang=xx`): ignored, fall through to Accept-Language → default uk.
      - Locale JSON file missing/malformed at build: build fails (CI catches).
      - Form mid-input on switch: `setLocale()` navigates to new URL, form state resets.
        No 'unsaved changes' warning (MVP, action is rare, no autosave).
      - Pending-user banner on `/dashboard` localized too — value (`status === 'pending'`)
        from authStore, but text via `t()`.
      - Invalid 2-letter prefix in URL: stripped to default by global middleware (Story E).
      - Zod schemas constructed at module scope: wrap in `computed(() => toTypedSchema(...))`
        so they re-build on locale change — otherwise live-switch leaves stale UA validation messages.
      - SSR/hydration mismatch risk: locale resolved server-side from cookie + Accept-Language
        before render — both sides see the same locale, no mismatch.
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: |
      - Missing key in en.json → fallback to uk.json + console.warn(dev only).
      - Missing key in uk.json (impossible if pre-commit checks both files have same keys,
        else lib falls through to raw key string).
      - API call fails → useApiError(err, context) maps to t('errors.{context}.{code}') with
        fallback to t('errors.generic'). Replaces 8 hardcoded catch-block strings today.
      - Network error during locale file load: not applicable — eager-loaded, bundled.
    gaps: ""
    required: true

  verification_strategy:
    score: 95
    status: "complete"
    value: |
      Agent verification:
        - `pnpm test` → Vitest green (LangSwitcher spec).
        - `pnpm playwright test e2e/i18n.spec.ts` → green (login → EN switch → assert EN strings).
        - Optional: `pnpm test:no-raw-strings` (grep-based gate).
      User verification:
        - `pnpm dev` → open localhost:3000/auth/login → click EN → URL becomes `/en/auth/login`,
          form re-renders EN.
        - Clear cookies → open `/dashboard` → redirect to `/auth/login`, locale = uk (or per
          Accept-Language if browser is set to en).
        - Incognito → `localhost:3000/en/profile` → 302 to `/en/auth/login`, page in EN.
        - `localhost:3000/fr/dashboard` → 302 → `/dashboard` (default).
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 90
    status: "complete"
    value: |
      Switcher placement:
        - default.vue topbar: right side, before Logout button: `[UK | EN]` (text-only toggle, active in bold/underline).
        - auth.vue: absolute-positioned top-right of background container (above the central card).
      Style: simple text toggle, no flag icons, no dropdown (overkill for 2 langs).
      Behavior: silent immediate swap, no toast/notification, no loading flash (eager load).
      Active locale visually highlighted.
      Brand name 'Bot Funnel' stays as-is in both locales.
    gaps: ""
    required: false

  risks:
    score: 90
    status: "complete"
    value: |
      1. **Security regression on prefixed auth URLs.** `/auth/**` routeRules (X-Robots-Tag,
         Referrer-Policy) currently protect `?token=` URLs from indexing/leaking. After
         enabling `prefix_except_default`, `/en/auth/**` must get the same headers. Mitigation:
         add mirror rule in nuxt.config.ts.
      2. **Auth middleware path-based check breaks.** `middleware/auth.global.ts` uses
         `path.startsWith('/auth/')` — fails for `/en/auth/...`. Mitigation: use
         `getRouteBaseName(route)` from @nuxtjs/i18n.
      3. **20 hardcoded paths** in `<NuxtLink to=...>` and `navigateTo(...)` across pages /
         middleware / layouts. Mitigation: replace with `<NuxtLinkLocale>` or `localePath()`.
      4. **Zod schema live-switch** leaves stale messages. Mitigation: wrap schema in
         `computed()` so it rebuilds on locale change.
      5. **Existing test asserts** match UA literals (`/коректний email/i`). They keep
         passing because default locale stays uk — confirmed acceptable, no rewrite needed.
      6. **Nuxt 4 + @nuxtjs/i18n@9 path convention.** Locale files live at `frontend/i18n/locales/`
         (not `frontend/locales/`) under Nuxt 4 default `restructureDir: 'i18n'`. Risk of
         misconfig — verify on smoke test.
    gaps: ""
    required: true

  technical_decisions:
    score: 90
    status: "complete"
    value: |
      - Library: @nuxtjs/i18n@^9 (vue-i18n@11 internally).
      - URL strategy: prefix_except_default.
      - Persistence: cookie `i18n_lang`, 1-year TTL.
      - Detection precedence: URL > cookie > Accept-Language > default uk.
      - Locale files: `frontend/i18n/locales/uk.json`, `frontend/i18n/locales/en.json`.
      - Key naming: nested JSON, camelCase, English keys (e.g. `auth.login.title`).
      - Namespaces: common, layout, auth.{login|register|forgotPassword|resetPassword|verifyEmail},
        dashboard, profile, validation, errors.
      - Eager-load locales (no async chunks).
      - Missing-key fallback: en → uk → raw key + dev warn.
      - useApiError composable: signature `useApiError(): (err, context) => string`,
        replaces 8 duplicated status-extraction + UA error-mapping copies.
      - Invalid-locale-prefix fallback: server-side global middleware
        `middleware/00-i18n-fallback.global.ts` strips unknown 2-letter prefixes → default.
      - Brand 'Bot Funnel' unchanged across locales.
      - <title>/useHead localization: explicitly out of scope.
      - detectBrowserLanguage.redirectOn: 'no prefix' (returning EN visitor on '/dashboard'
        redirected to '/en/dashboard').
      - Cookie config: `cookieSecure` = env-conditional (false in dev, true in prod —
        mirrors SESSION_COOKIE_SECURE pattern in deployment.md), `sameSite: 'lax'`.
      - app.vue: explicit `useLocaleHead({ addSeoAttributes: true })` + `useHead({ htmlAttrs })`
        — lib does NOT auto-update `<html lang>`.
      - Existing tests/middleware/auth.global.spec.ts path asserts kept unchanged: variant A
        (`localePath('/auth/login')` returns `/auth/login` for default uk — no prefix).
    gaps: ""
    required: false

  deploy_approach:
    score: 90
    status: "complete"
    value: |
      Frontend-only change. Same build pipeline (`pnpm build`). No env vars added.
      No backend or infra changes. No DB migration. CI: existing test job runs Vitest;
      add E2E job step (Playwright) — flagged as part of test infrastructure work.
    gaps: ""
    required: false

  manual_user_actions:
    score: 100
    status: "complete"
    value: "None. All work is code + JSON locale files."
    gaps: ""
    required: false

